<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>LifeDrop — One Drop. Many Lives.</title>
    <meta name="description" content="LifeDrop is a mission-critical public health platform connecting blood donors with recipients in under 15 minutes. Register as a donor and save up to 3 lives." />
    <meta name="keywords" content="blood donation, emergency blood request, blood donor finder, blood bank stocks, save lives, LifeDrop" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lifedrop.org/" />
    <meta property="og:title" content="LifeDrop — One Drop. Many Lives." />
    <meta property="og:description" content="Connect with blood donors instantly. Save lives or request blood for emergency needs in minutes." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

    <!-- Inline loading & critical helper styles -->
    <style>
      /* Ensure sr-only is hidden before Tailwind CSS bundles load */
      .sr-only:not(:focus) {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }
      
      /* Themed preloader layout */
      #initial-loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #1A1A2E; /* Brand Charcoal */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        color: #F9F4F0; /* Off-white */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        width: 320px;
        height: 280px;
      }

      .pulse-ring {
        position: absolute;
        border-radius: 50%;
        background-color: rgba(192, 57, 43, 0.05); /* Brand Primary Red / 5% */
        width: 260px;
        height: 260px;
        animation: loader-pulse 2s infinite ease-in-out;
        z-index: 1;
      }
      
      .ecg-svg {
        position: absolute;
        width: 300px;
        height: 120px;
        z-index: 2;
        opacity: 0.9;
        top: 40px;
      }
      
      .ecg-line {
        stroke: #C0392B;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        animation: trace-ecg 1.6s linear infinite;
        filter: drop-shadow(0 0 5px rgba(192, 57, 43, 0.85));
      }
      
      .loader-logo-pulse {
        position: relative;
        z-index: 10;
        margin-top: 20px;
        animation: loader-heartbeat 1.6s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .loader-drop-svg {
        width: 80px;
        height: 104px;
        filter: drop-shadow(0 6px 18px rgba(192, 57, 43, 0.45));
      }
      
      .loader-brand-text {
        margin-top: 1.5rem;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #F9F4F0;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        z-index: 10;
      }
      
      .loader-tagline {
        margin-top: 0.25rem;
        font-size: 0.75rem;
        color: rgba(249, 244, 240, 0.7);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 500;
        z-index: 10;
      }
      
      .loader-dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }
      
      .loader-dots span {
        width: 6px;
        height: 6px;
        background-color: #C0392B;
        border-radius: 50%;
        animation: loader-flash 1.4s infinite linear;
        display: inline-block;
      }
      
      .loader-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      
      .loader-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      
      @keyframes loader-pulse {
        0%, 100% {
          transform: scale(0.95);
          opacity: 0.4;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.85;
        }
      }

      @keyframes loader-heartbeat {
        0%, 100% {
          transform: scale(1);
        }
        30% {
          transform: scale(1);
        }
        38% {
          transform: scale(1.15); /* Beats exactly when R-wave spike passes */
        }
        46% {
          transform: scale(1.05);
        }
        54% {
          transform: scale(1.25); /* Second pulse (lub-dub) */
        }
        70% {
          transform: scale(1);
        }
      }
      
      @keyframes trace-ecg {
        0% {
          stroke-dashoffset: 800;
        }
        55% {
          stroke-dashoffset: 0;
        }
        75% {
          stroke-dashoffset: 0;
          opacity: 1;
        }
        90% {
          stroke-dashoffset: 0;
          opacity: 0;
        }
        100% {
          stroke-dashoffset: -800;
          opacity: 0;
        }
      }
      
      @keyframes loader-flash {
        0%, 80%, 100% { opacity: 0.2; }
        40% { opacity: 1; }
      }
    </style>
  </head>
  <body class="bg-brand-bg text-brand-charcoal font-sans antialiased selection:bg-brand-warm selection:text-white">
    <!-- Skip to main content for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:bg-brand-primary focus:text-white focus:px-4 focus:py-2 focus:rounded focus:z-50 focus:outline-none">
      Skip to main content
    </a>
    
    <div id="root">
      <!-- Initial Themed Preloader (Replaced by React once mounted) -->
      <div id="initial-loader-wrapper">
        <div class="loader-container">
          <div class="pulse-ring"></div>
          
          <!-- ECG Heartbeat Line SVG -->
          <svg class="ecg-svg" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
            <!-- Background grid lines for clinical medical context -->
            <line x1="0" y1="60" x2="300" y2="60" stroke="rgba(192, 57, 43, 0.08)" stroke-width="1" stroke-dasharray="2 4" />
            <!-- ECG trace path -->
            <path class="ecg-line" d="M 0 60 H 100 L 110 50 L 120 70 L 132 15 L 148 105 L 158 60 H 170 Q 182 45 194 60 T 206 60 H 300" fill="none" />
          </svg>
          
          <div class="loader-logo-pulse">
            <svg 
              viewBox="0 0 100 130" 
              class="loader-drop-svg"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path 
                d="M50 10 C 50 10, 92 65, 92 90 A 42 42 0 1 1 8 90 C 8 65, 50 10, 50 10 Z" 
                fill="#C0392B" 
                stroke="#E74C3C"
                stroke-width="1.5"
              />
              <path
                d="M32 65 C 28 75, 28 85, 32 92 C 34 94, 30 94, 28 92 C 24 85, 24 75, 28 65 C 29 63, 31 63, 32 65 Z"
                fill="#FFFFFF"
                opacity="0.25"
              />
            </svg>
          </div>
          
          <div class="loader-brand-text">
            LifeDrop<span class="loader-dots"><span></span><span></span><span></span></span>
          </div>
          <div class="loader-tagline">
            One Drop. Many Lives.
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
